<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy One Year</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    .screen {
      width: 100%;
      height: 100vh;
      display: none;
      position: relative;
    }

    .active {
      display: flex;
    }

    /* 🌲 FIRST PAGE */
    .intro-screen {
      background: url('bg.png') no-repeat center center/cover;
      justify-content: center;
      align-items: center;
    }

    .intro-overlay {
      margin-top: 140px;
      background: rgba(140, 20, 20, 0.9);
      color: #fff8f0;
      padding: 26px 40px;
      border-radius: 6px;
      font-size: 2rem;
      font-family: "Courier New", monospace;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      letter-spacing: 2px;
    }

    /* 🤍 SECOND PAGE */
    .main-screen {
      background: #f8f3ea;
      justify-content: center;
      align-items: center;
    }

    /* floating hearts */
    .heart {
      position: absolute;
      bottom: -40px;
      color: #b3202e;
      opacity: 0.15;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {transform: translateY(0); opacity: 0;}
      10% {opacity: 0.2;}
      100% {transform: translateY(-120vh); opacity: 0;}
    }

    /* 🎬 video */
    .full-video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <!-- intro -->
  <div class="screen intro-screen active" id="introScreen">
    <div class="intro-overlay" onclick="openMainPage()">click me</div>
  </div>

  <!-- main -->
  <div class="screen main-screen" id="mainScreen">
    <video id="myVideo" loop controls class="full-video">
      <source src="love.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    function openMainPage() {
      document.getElementById("introScreen").classList.remove("active");
      document.getElementById("mainScreen").classList.add("active");

      const video = document.getElementById("myVideo");
      video.play();
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "♥";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (18 + Math.random() * 30) + "px";
      heart.style.animationDuration = (6 + Math.random() * 6) + "s";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 12000);
    }

    setInterval(createHeart, 400);
  </script>

</body>
</html>
